name: Trigger Codex review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  request-codex-review:
    if: |
      (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
      github.event.action == 'ready_for_review'
    runs-on: ubuntu-latest

    steps:
      - name: Post @codex review comment as user
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PIOTR_PR_COMMENT_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("No pull_request payload found.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;

            const marker = '<!-- codex-auto-trigger -->';
            const body =
              `${marker}\n` +
              `@codex review\n\n` +
              `Triggered automatically because this PR was opened ready for review ` +
              `or was marked ready for review.`;

            // Check existing comments so we don't post duplicates.
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const alreadyTriggered = comments.some(comment =>
              comment.body?.includes(marker)
            );

            if (alreadyTriggered) {
              core.info('Codex trigger comment already exists.');
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
